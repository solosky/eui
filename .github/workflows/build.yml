name: Build & Test

on: [push, pull_request]

jobs:
  test:
    name: Test (bpp=${{ matrix.color_depth }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        color_depth: [1, 8, 16]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: |
          cmake -B build \
            -DEUI_BUILD_TESTS=ON \
            -DEUI_BUILD_EXAMPLES=OFF \
            -DEUI_BUILD_CROSS_EXAMPLES=OFF \
            -DEUI_COLOR_DEPTH=${{ matrix.color_depth }} \
            -DEUI_FONT_ENABLE_U8G2=ON \
            -DEUI_FONT_ENABLE_KERNING=ON \
            -DEUI_FONT_ENABLE_MULTILINE=ON

      - name: Build
        run: cmake --build build -j

      - name: Run tests
        run: cd build && ctest --output-on-failure

  examples:
    name: Examples (bpp=${{ matrix.color_depth }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        color_depth: [1, 16]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install raylib system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev

      - name: Configure
        run: |
          cmake -B build \
            -DEUI_BUILD_TESTS=OFF \
            -DEUI_BUILD_EXAMPLES=OFF \
            -DEUI_BUILD_CROSS_EXAMPLES=ON \
            -DEUI_TARGET_PORT=raylib \
            -DEUI_COLOR_DEPTH=${{ matrix.color_depth }}

      - name: Build
        run: cmake --build build -j

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure for coverage
        run: |
          cmake -B build \
            -DEUI_BUILD_TESTS=ON \
            -DEUI_BUILD_EXAMPLES=OFF \
            -DEUI_BUILD_CROSS_EXAMPLES=OFF \
            -DEUI_COLOR_DEPTH=1 \
            -DEUI_FONT_ENABLE_U8G2=ON \
            -DEUI_FONT_ENABLE_KERNING=ON \
            -DEUI_FONT_ENABLE_MULTILINE=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build
        run: cmake --build build -j

      - name: Run tests
        run: cd build && ctest --output-on-failure

      - name: Generate coverage report
        run: |
          cd build
          lcov --capture --directory . --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '*/test/*' '*/third_party/*' --output-file coverage.info
          lcov --list coverage.info

      - name: Display font file coverage
        run: |
          cd build
          echo "=== Font-Related File Coverage ==="
          lcov --list coverage.info 2>&1 | grep -E 'eui_font|eui_canvas|lines'
          echo ""
          echo "=== Full Coverage Summary ==="
          lcov --summary coverage.info 2>&1
